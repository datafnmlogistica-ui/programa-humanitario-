<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMA HUMANITARIO FUNDACION NUEVO MUNDO</title>
    <style>
        /* Forzamos a que la página ocupe toda la pantalla sin barras de desplazamiento externas */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* Mismo color oscuro de tu diseño */
        }
        
        /* Contenedor inteligente: Recorta los bordes para esconder la barra de Google */
        .contenedor-oculto {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Subimos el iframe exactamente 46px hacia arriba para sacar la barra gris de la pantalla */
        iframe {
            position: absolute;
            top: -46px; 
            left: 0;
            width: 100%;
            /* Compensamos los 46px abajo para que el formulario no quede recortado al fondo */
            height: calc(100% + 46px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-oculto">
        <iframe src="https://script.google.com/macros/s/AKfycbwqIaagHCKRojnMJBR0PUa2m4BfaZTDhgCu6rBxlfDBomQZ2tLY-k2GnsKnO4VHNq2A/exec"></iframe>
    </div>

</body>
</html>
