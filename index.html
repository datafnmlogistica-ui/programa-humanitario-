<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMA HUMANITARIO - REGISTRO SEGURO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* Fondo oscuro neón */
        }
        
        /* Contenedor seguro que esconde la franja de Google */
        .contenedor-seguro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Subimos el iframe para ocultar la barra, pero agregamos un padding interno */
        iframe {
            position: absolute;
            top: -48px; 
            left: 0;
            width: 100%;
            height: calc(100% + 48px); 
            border: none;
            /* Empuja el contenido real de tu formulario 48px hacia abajo, */
            /* compensando exactamente la subida para que nada se corte */
            padding-top: 48px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="contenedor-seguro">
        <iframe src="https://script.google.com/macros/s/AKfycbyZfdz2l638Mxl85nDioIQxrwet4E4nqLcNLEDdf50FAHB1catY13OPKbQTHlbsnCS_/exec"></iframe>
    </div>

</body>
</html>
