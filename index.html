<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMA HUMANITARIO FUNDACION NUEVO MUNDO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* El fondo oscuro de tu app */
        }
        
        /* Contenedor que recorta la barra de Google */
        .contenedor-blindado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Medida exacta: Oculta la barra gris sin recortar tu diseño */
        iframe {
            position: absolute;
            top: -46px; 
            left: 0;
            width: 100%;
            height: calc(100% + 46px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-blindado">
        <iframe src="https://script.google.com/macros/s/AKfycbwqIaagHCKRojnMJBR0PUa2m4BfaZTDhgCu6rBxlfDBomQZ2tLY-k2GnsKnO4VHNq2A/exec"></iframe>
    </div>

</body>
</html>
