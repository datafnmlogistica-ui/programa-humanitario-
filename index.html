<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMA HUMANITARIO - REGISTRO SEGURO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* Fondo oscuro */
        }
        
        /* Contenedor que ocupa toda la pantalla */
        .contenedor-formulario {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* El formulario se muestra al 100% de su tamaño real, sin recortes */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-formulario">
        <iframe src="https://script.google.com/macros/s/AKfycbyZfdz2l638Mxl85nDioIQxrwet4E4nqLcNLEDdf50FAHB1catY13OPKbQTHlbsnCS_/exec"></iframe>
    </div>

</body>
</html>
