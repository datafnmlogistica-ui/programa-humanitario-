<script>
// Cambia "formulario-humanitario" por el ID real que tenga tu etiqueta <form>
document.getElementById("formulario-humanitario").addEventListener("submit", function(e) {
    e.preventDefault();
    
    // Mapea aquí los inputs de tu formulario
    var datosFormulario = {
        campo1: document.getElementById("tu_input_1").value,
        campo2: document.getElementById("tu_input_2").value
        // Agrega los campos que necesites...
    };

    // Envío invisible hacia tu nueva URL de Google Sheets
    fetch("https://script.google.com/macros/s/AKfycbwqIaagHCKRojnMJBR0PUa2m4BfaZTDhgCu6rBxlfDBomQZ2tLY-k2GnsKnO4VHNq2A/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datosFormulario)
    })
    .then(() => {
        alert("¡Registro enviado con éxito!");
        document.getElementById("formulario-humanitario").reset(); // Limpia el formulario
    })
    .catch((error) => {
        console.error("Error:", error);
    });
});
</script>
