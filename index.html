<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMA HUMANITARIO FUNDACION NUEVO MUNDO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
        }
        .contenedor-blindado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: -50px; /* Esconde la barra gris de abuso */
            left: 0;
            width: 100%;
            height: calc(100% + 50px); 
            border: none;
        }
    </style>
</head>
<body>
    <div class="contenedor-blindado">
        <iframe src="PEGA_AQUÍ_TU_NUEVA_URL_DE_GOOGLE"></iframe>
    </div>
</body>
</html>
