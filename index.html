<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <title>PROGRAMA HUMANITARIO FUNDACION NUEVO MUNDO</title>
    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .form-container {
        background-color: #1e1e1e;
        border: 2px solid #00F0FF;
        box-shadow: 0 0 15px #00F0FF, inset 0 0 10px #121212;
        border-radius: 12px;
        padding: 30px;
        max-width: 530px;
        width: 100%;
      }
      h1 {
        color: #39FF14;
        text-shadow: 0 0 8px #39FF14;
        font-size: 20px;
        text-align: center;
        margin-bottom: 5px;
        text-transform: uppercase;
      }
      h2 {
        color: #FF6EC7;
        font-size: 14px;
        text-align: center;
        margin-top: 0;
        margin-bottom: 25px;
        font-weight: normal;
      }
      .verificacion-box {
        background-color: #151515;
        border: 1px dashed #00F0FF;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
      }
      .verificacion-inline {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }
      .verificacion-inline .input-group {
        flex: 1;
        min-width: 180px;
        margin-bottom: 0;
      }
      .btn-check {
        color: #00F0FF;
        border: 2px solid #00F0FF;
        box-shadow: 0 0 5px rgba(0, 240, 255, 0.2);
        padding: 10px 15px;
        height: 41px;
        flex: 0 0 auto;
      }
      .btn-check:hover {
        background-color: #00F0FF;
        color: #121212;
        box-shadow: 0 0 15px #00F0FF;
      }
      #msg-verificacion-lado {
        flex: 1 0 100%;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 0.5px;
        margin-top: 5px;
        align-self: center;
      }
      @media(min-width: 450px) {
        #msg-verificacion-lado {
          flex: 1;
          margin-top: 0;
        }
      }
      .input-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #E0E0E0;
      }
      .req {
        color: #FF6EC7;
        margin-left: 3px;
      }
      input, select {
        width: 100%;
        padding: 10px;
        background-color: #2D2D2D;
        border: 1px solid #555;
        border-radius: 6px;
        color: #ffffff;
        font-size: 14px;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }
      input:focus, select:focus {
        outline: none;
        border-color: #39FF14;
        box-shadow: 0 0 8px #39FF14;
      }
      input:disabled, select:disabled {
        background-color: #1a1a1a;
        color: #888888;
        border-color: #333333;
        cursor: not-allowed;
      }
      .uppercase-input {
        text-transform: uppercase;
      }
      .file-info {
        font-size: 11px;
        color: #FF6EC7;
        margin-top: 5px;
      }
      .button-group {
        display: flex;
        gap: 15px;
        margin-top: 15px;
      }
      button {
        padding: 12px;
        background-color: transparent;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      button:disabled {
        border-color: #444 !important;
        color: #555 !important;
        cursor: not-allowed;
        box-shadow: none !important;
        background-color: transparent !important;
      }
      .btn-submit {
        flex: 1;
        color: #39FF14;
        border: 2px solid #39FF14;
        box-shadow: 0 0 5px rgba(57, 255, 20, 0.2);
      }
      .btn-submit:hover:not(:disabled) {
        background-color: #39FF14;
        color: #121212;
        box-shadow: 0 0 15px #39FF14;
      }
      .btn-reset {
        flex: 1;
        color: #FF6EC7;
        border: 2px solid #FF6EC7;
        box-shadow: 0 0 5px rgba(255, 110, 199, 0.2);
      }
      .btn-reset:hover {
        background-color: #FF6EC7;
        color: #121212;
        box-shadow: 0 0 15px #FF6EC7;
      }
      #status-message-bottom {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        font-weight: bold;
      }
      .success { color: #39FF14; text-shadow: 0 0 5px #39FF14; }
      .error { color: #FF6EC7; text-shadow: 0 0 5px #FF6EC7; }
      .duplicado { color: #00F0FF; text-shadow: 0 0 8px #00F0FF; font-size: 13px; font-weight: bold; }
    </style>
  </head>
  <body>

    <div class="form-container">
      <h1>Programa Humanitario<br>Fundación Nuevo Mundo</h1>
      <h2>- Manos dispuestas a servir -</h2>
      
      <div class="verificacion-box">
        <div class="verificacion-inline">
          <div class="input-group">
            <label>DOCUMENTO DE IDENTIDAD <span class="req">*</span></label>
            <input type="text" id="documentoVerificar" placeholder="Identificación...">
          </div>
          <button type="button" class="btn-check" onclick="verificarAntesDeLlenar()">Verificar</button>
          <div id="msg-verificacion-lado"></div>
        </div>
      </div>

      <form id="registroForm">
        <input type="hidden" id="documento">

        <div class="input-group">
          <label>NOMBRE COMPLETO <span class="req">*</span></label>
          <input type="text" id="nombre" class="uppercase-input" disabled required>
        </div>

        <div class="input-group">
          <label>NÚMERO DE CELULAR <span class="req">*</span></label>
          <input type="tel" id="celular" disabled required>
        </div>
        
        <div class="input-group">
          <label>USUARIO TELEGRAM <span class="req">*</span></label>
          <input type="text" id="telegram" disabled required>
        </div>
        
        <div class="input-group">
          <label>CORREO <span class="req">*</span></label>
          <input type="email" id="correo" disabled required>
        </div>
        
        <div class="input-group">
          <label>PASAPORTE <span class="req">*</span></label>
          <input type="text" id="pasaporte" class="uppercase-input" disabled required>
        </div>
        
        <div class="input-group">
          <label>CÓDIGO POSTAL <span class="req">*</span></label>
          <input type="text" id="codigo_postal" disabled required>
        </div>
        
        <div class="input-group">
          <label>CIUDAD <span class="req">*</span></label>
          <input type="text" id="ciudad" class="uppercase-input" disabled required>
        </div>
        
        <div class="input-group">
          <label>DEPARTAMENTO <span class="req">*</span></label>
          <input type="text" id="departamento" class="uppercase-input" disabled required>
        </div>
        
        <div class="input-group">
          <label>PAÍS <span class="req">*</span></label>
          <input type="text" id="pais" class="uppercase-input" disabled required>
        </div>
        
        <div class="input-group">
          <label>LÍDER <span class="req">*</span></label>
          <select id="lider" disabled required>
            <option value="">Primero verifique documento...</option>
          </select>
        </div>

        <div class="input-group">
          <label>VALOR DEL VOUCHER (Solo números - COP) <span class="req">*</span></label>
          <input type="number" id="valorVoucher" placeholder="Ej: 50000" min="1" disabled required>
        </div>

        <div class="input-group">
          <label>NÚMERO O REFERENCIA DE VOUCHER <span class="req">*</span></label>
          <input type="text" id="refVoucher" placeholder="Ej: REF123456" disabled required>
        </div>

        <div class="input-group">
          <label>SUBIR VOUCHER(S) (Imagen o PDF - Máx 10 archivos, 10MB c/u) <span class="req">*</span></label>
          <input type="file" id="archivosVoucher" accept="image/*,application/pdf" multiple disabled required>
          <div class="file-info">Máximo 10 archivos. Solo imágenes (.jpg, .png) o .pdf (Peso máx. 10MB cada uno).</div>
        </div>
        
        <div class="button-group">
          <button type="button" id="btnRegistrar" class="btn-submit" onclick="enviarDatos()" disabled>Registrar</button>
          <button type="button" class="btn-reset" onclick="reiniciarFormularioCompleto()">Nueva Consulta</button>
        </div>
      </form>
      
      <div id="status-message-bottom"></div>
    </div>

    <script>
      var listaLideresGlobal = [];
      var archivosCargadosBase64 = []; // Guarda archivos temporalmente

      window.onload = function() {
        google.script.run
          .withSuccessHandler(function(listaLideres) {
            listaLideresGlobal = listaLideres;
          })
          .obtenerLideres();

        // Escuchar la carga de archivos
        document.getElementById("archivosVoucher").addEventListener("change", procesarArchivos);
      };

      // Procesa y valida los archivos de voucher
      function procesarArchivos(e) {
        archivosCargadosBase64 = [];
        var files = e.target.files;
        
        if (files.length > 10) {
          alert("No puede subir más de 10 archivos.");
          e.target.value = "";
          return;
        }

        for (var i = 0; i < files.length; i++) {
          var file = files[i];
          
          // Validación de peso (10MB = 10 * 1024 * 1024 bytes)
          if (file.size > 10 * 1024 * 1024) {
            alert("El archivo '" + file.name + "' supera el peso máximo permitido de 10MB.");
            e.target.value = "";
            archivosCargadosBase64 = [];
            return;
          }

          var reader = new FileReader();
          reader.onload = (function(f) {
            return function(evt) {
              archivosCargadosBase64.push({
                nombre: f.name,
                tipo: f.type,
                data: evt.target.result
              });
            };
          })(file);
          reader.readAsDataURL(file);
        }
      }

      function verificarAntesDeLlenar() {
        var msgLado = document.getElementById("msg-verificacion-lado");
        var msgBottom = document.getElementById("status-message-bottom");
        var doc = document.getElementById("documentoVerificar").value.trim();
        
        msgLado.className = "";
        msgLado.textContent = "";
        msgBottom.className = "";
        msgBottom.textContent = "";

        if (doc === "") {
          alert("Por favor, introduzca un número de documento válido.");
          return;
        }

        msgLado.style.color = "#AAAAAA";
        msgLado.textContent = "Buscando...";

        google.script.run
          .withSuccessHandler(function(resultado) {
            var inputs = document.querySelectorAll("#registroForm input, #registroForm select");
            
            if (resultado.registrado) {
              msgLado.className = "duplicado";
              msgLado.textContent = "USTED YA SE ENCUENTRA REGISTRADO";

              document.getElementById("documento").value = doc;
              document.getElementById("nombre").value = resultado.datos.nombre;
              document.getElementById("celular").value = resultado.datos.celular;
              document.getElementById("telegram").value = resultado.datos.telegram;
              document.getElementById("correo").value = resultado.datos.correo;
              document.getElementById("pasaporte").value = resultado.datos.pasaporte;
              document.getElementById("codigo_postal").value = resultado.datos.codigo_postal;
              document.getElementById("ciudad").value = resultado.datos.ciudad;
              document.getElementById("departamento").value = resultado.datos.departamento;
              document.getElementById("pais").value = resultado.datos.pais;
              document.getElementById("valorVoucher").value = resultado.datos.valorVoucher;
              document.getElementById("refVoucher").value = resultado.datos.refVoucher;
              
              var selectLider = document.getElementById("lider");
              selectLider.innerHTML = `<option value="${resultado.datos.lider}">${resultado.datos.lider}</option>`;

              // Mostrar que tiene archivos subidos de manera ilustrativa
              document.getElementById("archivosVoucher").type = "text";
              document.getElementById("archivosVoucher").value = "Voucher(s) subido(s) previamente.";

              inputs.forEach(input => input.disabled = true);
              document.getElementById("btnRegistrar").disabled = true;

            } else {
              msgLado.className = "success";
              msgLado.textContent = "✓ Libre para registrar.";
              
              document.getElementById("documento").value = doc;
              document.getElementById("archivosVoucher").type = "file"; // reset type

              inputs.forEach(input => {
                if(input.id !== "documento") input.disabled = false;
              });

              var selectLider = document.getElementById("lider");
              selectLider.innerHTML = '<option value="">-- Seleccione un Líder --</option>';
              listaLideresGlobal.forEach(function(lider) {
                var opt = document.createElement("option");
                opt.value = lider;
                opt.textContent = lider;
                selectLider.appendChild(opt);
              });

              document.getElementById("btnRegistrar").disabled = false;
            }
          })
          .verificarDuplicado(doc);
      }

      function reiniciarFormularioCompleto() {
        document.getElementById("registroForm").reset();
        document.getElementById("documentoVerificar").value = "";
        document.getElementById("documento").value = "";
        archivosCargadosBase64 = [];
        
        document.getElementById("msg-verificacion-lado").textContent = "";
        document.getElementById("status-message-bottom").textContent = "";

        document.getElementById("archivosVoucher").type = "file";

        var inputs = document.querySelectorAll("#registroForm input, #registroForm select");
        inputs.forEach(input => input.disabled = true);
        document.getElementById("btnRegistrar").disabled = true;

        var selectLider = document.getElementById("lider");
        selectLider.innerHTML = '<option value="">Primero verifique documento...</option>';
        
        document.getElementById("documentoVerificar").focus();
      }

      function enviarDatos() {
        var msgBottom = document.getElementById("status-message-bottom");
        msgBottom.className = "";
        msgBottom.textContent = "Enviando datos y subiendo vouchers...";

        // Validación de archivos obligatorios
        if (archivosCargadosBase64.length === 0) {
          msgBottom.className = "error";
          msgBottom.textContent = "Por favor, cargue al menos un voucher válido (imagen o PDF).";
          return;
        }

        var datos = {
          nombre: document.getElementById("nombre").value.trim(),
          documento: document.getElementById("documento").value.trim(),
          celular: document.getElementById("celular").value.trim(),
          telegram: document.getElementById("telegram").value.trim(),
          correo: document.getElementById("correo").value.trim(),
          pasaporte: document.getElementById("pasaporte").value.trim(),
          codigo_postal: document.getElementById("codigo_postal").value.trim(),
          ciudad: document.getElementById("ciudad").value.trim(),
          departamento: document.getElementById("departamento").value.trim(),
          pais: document.getElementById("pais").value.trim(),
          lider: document.getElementById("lider").value,
          valorVoucher: document.getElementById("valorVoucher").value.trim(),
          refVoucher: document.getElementById("refVoucher").value.trim(),
          archivos: archivosCargadosBase64
        };

        // Deshabilitar botón durante el proceso de subida
        document.getElementById("btnRegistrar").disabled = true;

        google.script.run
          .withSuccessHandler(function(resultado) {
            if (resultado.exito) {
              msgBottom.className = "success";
              msgBottom.textContent = resultado.mensaje;
              setTimeout(reiniciarFormularioCompleto, 3000);
            } else {
              msgBottom.className = "error";
              msgBottom.textContent = resultado.mensaje;
              document.getElementById("btnRegistrar").disabled = false;
            }
          })
          .guardarDesdeWeb(datos);
      }
    </script>
  </body>
</html>
